<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<header class="global-header" th:fragment="header(activePage)">
    <a th:href="@{/}" class="logo-container">
        <span class="logo-bolt">⚡</span>
        <span class="logo-text-blue">WNT</span>
        <span class="logo-text-purple">.TRK</span>
    </a>

    <nav>
        <ul class="nav-links">
            <li class="nav-item" th:classappend="${activePage == 'dashboard'} ? 'active'">
                <a th:href="@{/dashboard}">Dashboard</a>
            </li>
            <li class="nav-item" th:classappend="${activePage == 'claims'} ? 'active'">
                <a th:href="@{/claims}">Claims Center</a>
            </li>
            <li class="nav-item" th:classappend="${activePage == 'login'} ? 'active'">
                <a th:href="@{/users/login}">Sign In</a>
            </li>
            <li class="nav-item" th:classappend="${activePage == 'register'} ? 'active'">
                <a th:href="@{/users/register}">Register</a>
            </li>
        </ul>
    </nav>
</header>
</body>
</html>
