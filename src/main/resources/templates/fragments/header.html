<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

</html>>

<body>
    <header class="global-header" th:fragment="header(activePage)">
        <a th:href="@{/dashboard}" class="logo-container">
            <span class="logo-bolt">⚡</span>
            <span class="logo-text-blue">WNT</span>
            <span class="logo-text-purple">.TRK</span>
        </a>

        <nav>
            <ul class="nav-links">
                <li sec:authorize="isAuthenticated()" class="nav-item"
                    th:classappend="${activePage == 'dashboard'} ? 'active'">
                    <a th:href="@{/dashboard}">Dashboard</a>
                </li>
                <li sec:authorize="!isAuthenticated()" class="nav-item"
                    th:classappend="${activePage == 'login'} ? 'active'">
                    <a th:href="@{/users/login}">Sign In</a>
                </li>
                <li sec:authorize="!isAuthenticated()" class="nav-item"
                    th:classappend="${activePage == 'register'} ? 'active'">
                    <a th:href="@{/users/register}">Register</a>
                </li>
                <li sec:authorize="isAuthenticated()" class="nav-item">
                    <form th:action="@{/users/logout}" method="post">
                        <button type="submit" class="sign-out-link">Sign Out</button>
                    </form>
                </li>
            </ul>
        </nav>
    </header>
</body>

</html>
