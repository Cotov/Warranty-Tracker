<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Add Claim | Warranty Tracker', '/css/claim-form.css')}"></head>

<body class="claim-form-page">

    <div th:replace="~{fragments/header :: header('dashboard')}"></div>

    <div class="claim-form-container">

        <a href="#" class="back-link">Back to Claims</a>

        <div class="page-header">
            <h1>SYS.NEW_CLAIM()</h1>
            <p>File a new warranty claim for this product.</p>
        </div>

        <div class="product-context">
            <div class="product-context-label">// product</div>
            <div class="product-context-grid">
                <div class="product-context-field">
                    <label>Description</label>
                    <span th:text="${addClaimRequest.product.description}"></span>
                </div>
                <div class="product-context-field">
                    <label>Serial #</label>
                    <span th:text="${addClaimRequest.product.serialNumber}"></span>
                </div>
                <div class="product-context-field">
                    <label>Warranty Ends</label>
                    <span th:text="${addClaimRequest.product.warrantyEndDate}"></span>
                </div>
            </div>
        </div>

        <div class="status-note">
            <span>Initial status will be set to</span>
            <span class="status-badge-sm">Pending</span>
        </div>

        <!-- Business rule error banner — shown when warranty expired or open claim exists -->
        <!-- <div class="error-banner">
            <strong>[!] Claim blocked</strong> — <span>error message here</span>
        </div> -->

        <form th:action="@{/products/{productId}/claims/add(productId=${addClaimRequest.product.id})}" th:object="${addClaimRequest}" method="post">

            <div class="form-group">
                <label for="faultDescription">Fault Description</label>
                <textarea id="faultDescription" name="faultDescription"
                          placeholder="Describe the fault or issue in detail..." th:field="*{faultDescription}"></textarea>
                <span class="form-hint">Be specific — include when the issue occurs and how to reproduce it.</span>
                <!-- Validation error — add class 'input-error' to textarea and 'is-visible' to span -->
                <span class="error-message" th:classappend="${#fields.hasErrors('faultDescription')} ? 'is-visible' : ''"
                th:errors="*{faultDescription}"></span>
            </div>

            <button type="submit" class="btn-submit">Submit Claim</button>
        </form>

        <div class="footer-text">
            <a th:href="@{/products/{productId}/claims(productId=${addClaimRequest.product.id})}">← Back to Claims</a>
        </div>

    </div>

</body>

</html>
