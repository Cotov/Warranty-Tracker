<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Initialize Account | Warranty Tracker', '/css/register.css')}"></head>
<body>

<div th:replace="~{fragments/header :: header('register')}"></div>

<div class="register-container">
    <div class="page-header">
        <h1>SYS.REGISTER()</h1>
        <p>Initialize your local hardware asset tracking module</p>
    </div>

    

    <form th:action="@{/users/register}" th:object="${userRegisterRequest}" method="post">
        <div class="form-row">
            <div class="form-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" th:field="*{firstName}" placeholder="e.g. Hristo"
                       th:classappend="${#fields.hasErrors('firstName')} ? 'input-error'">
                <span class="error-message" th:classappend="${#fields.hasErrors('firstName')} ? 'is-visible'"
                      th:errors="*{firstName}">[!] CRITERIA FAILED</span>
            </div>
            <div class="form-group">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" th:field="*{lastName}" placeholder="e.g. Aleksandrov"
                       th:classappend="${#fields.hasErrors('lastName')} ? 'input-error'">
                <span class="error-message" th:classappend="${#fields.hasErrors('lastName')} ? 'is-visible'"
                      th:errors="*{lastName}">[!] CRITERIA FAILED</span>
            </div>
        </div>

        <div class="form-group">
            <label for="username">System Username</label>
            <input type="text" id="username" th:field="*{username}" placeholder="operator_id"
                   th:classappend="${#fields.hasErrors('username')} ? 'input-error'">
            <span class="error-message" th:classappend="${#fields.hasErrors('username')} ? 'is-visible'"
                  th:errors="*{username}">[!] CRITERIA FAILED</span>
        </div>

        <div class="form-group">
            <label for="email">Network Email Address</label>
            <input type="email" id="email" th:field="*{email}" placeholder="name@domain.bg"
                   th:classappend="${#fields.hasErrors('email')} ? 'input-error'">
            <span class="error-message" th:classappend="${#fields.hasErrors('email')} ? 'is-visible'"
                  th:errors="*{email}">[!] CRITERIA FAILED</span>
        </div>

        <div class="form-group">
            <label for="password">Security Cryptokey</label>
            <input type="password" id="password" th:field="*{password}" placeholder="••••••••"
                   th:classappend="${#fields.hasErrors('password')} ? 'input-error'">
            <span class="error-message" th:classappend="${#fields.hasErrors('password')} ? 'is-visible'"
                  th:errors="*{password}">[!] CRITERIA FAILED</span>
        </div>

        <button type="submit" class="btn-submit">Execute Registration</button>
    </form>

    <div class="footer-text">
        Existing authorization profile? <a th:href="@{/users/login}">Auth Here</a>
    </div>
</div>

</body>
</html>
