<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Authenticate | Warranty Tracker', '/css/login.css')}"></head>

<body>

    <div th:replace="~{fragments/header :: header('login')}"></div>

    <div class="login-container">
        <div class="page-header">
            <h1>SYS.AUTH()</h1>
            <p>Authenticate to access your hardware asset tracking module</p>
        </div>
        <form th:action="@{/users/login}" th:object="${userLoginRequest}" method="post">
            <div class="form-group">
                <label for="username">System Username</label>
                <input type="text" id="username" name="username" th:field="*{username}" placeholder="operator_id"
                th:classappend="${#fields.hasErrors('username')} ? 'input-error'">
                <span class="error-message" th:classappend="${#fields.hasErrors('username')} ? 'is-visible'"
                th:errors="*{username}">[!] CRITERIA FAILED</span>
            </div>

            <div class="form-group">
                <label for="password">Security Cryptokey</label>
                <input type="password" id="password" name="password" th:field="*{password}" placeholder="••••••••"
                th:classappend="${#fields.hasErrors('password')} ? 'input-error'">
                <span class="error-message" th:classappend="${#fields.hasErrors('password')} ? 'is-visible'"
                    th:errors="*{password}">[!] CRITERIA FAILED</span>
            </div>

            <button type="submit" class="btn-submit">Execute Authentication</button>
        </form>

        <div class="footer-text">
            No authorization profile? <a th:href="@{/users/register}">Register Here</a>
        </div>
    </div>

</body>

</html>
